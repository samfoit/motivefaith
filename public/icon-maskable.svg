<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable icon (no rounded corners) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Cross + flame mark — scaled down to fit in safe zone (center 80%) -->
  <g transform="translate(256,256) scale(0.7) translate(-256,-256)">
    <!-- Flame at top of cross -->
    <path d="
      M256 80
      C256 80 208 140 208 190
      C208 216 230 240 256 240
      C282 240 304 216 304 190
      C304 140 256 80 256 80Z
    " fill="white" opacity="0.95"/>
    <!-- Cross horizontal beam -->
    <rect x="176" y="248" width="160" height="48" rx="24" fill="white" opacity="0.95"/>
    <!-- Cross vertical lower beam -->
    <rect x="232" y="248" width="48" height="184" rx="24" fill="white" opacity="0.95"/>
  </g>
</svg>
